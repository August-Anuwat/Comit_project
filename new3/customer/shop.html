<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <title>Shop — IRONFORGE</title>
  <meta name="description" content="Browse 12,000+ professional-grade construction tools, heavy machinery, and building materials from top brands.">
  <meta name="author" content="IRONFORGE Supply Co.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://www.ironforge.com/shop.html">

  <meta property="og:type"        content="website">
  <meta property="og:title"       content="Shop — IRONFORGE">
  <meta property="og:description" content="Browse professional construction equipment and materials.">
  <meta property="og:url"         content="https://www.ironforge.com/shop.html">
  <meta property="og:site_name"   content="IRONFORGE">

  <meta name="theme-color" content="#3A4A5C">
  <meta name="color-scheme" content="light">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&family=Barlow:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body data-page="shop">

  <a class="skip-link" href="#main-content">Skip to main content</a>

  <!-- ===================================================
       NAVIGATION
  ==================================================== -->
  <header role="banner">
    <nav class="navbar" aria-label="Main navigation">
      <div class="container">
        <div class="navbar-inner">

          <a class="logo" href="index.html" aria-label="IRONFORGE — go to homepage">
            <div class="logo-mark" aria-hidden="true">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true" focusable="false">
                <rect x="2" y="2" width="6" height="14" fill="white"/>
                <rect x="10" y="2" width="6" height="9" fill="white" opacity="0.7"/>
              </svg>
            </div>
            <span class="logo-text" aria-hidden="true">IRON<span>FORGE</span></span>
          </a>

          <ul class="nav-links" role="list">
            <li role="listitem">
              <a class="nav-link" href="index.html" data-page="home">Home</a>
            </li>
            <li role="listitem">
              <a class="nav-link" href="shop.html" data-page="shop">Shop</a>
            </li>
            <li role="listitem">
              <a class="nav-link" href="about.html" data-page="about">About</a>
            </li>
            <li role="listitem">
              <a class="nav-link" href="contact.html" data-page="contact">Contact</a>
            </li>
          </ul>

          <div class="nav-actions">
            <a class="nav-btn" href="cart.html" data-cart aria-label="Shopping cart, 0 items">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2" aria-hidden="true" focusable="false">
                <circle cx="9"  cy="21" r="1"/>
                <circle cx="20" cy="21" r="1"/>
                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
              </svg>
              <span class="cart-count" id="cartCount" aria-hidden="true">0</span>
            </a>

            <button class="hamburger"
                    onclick="toggleMobileMenu()"
                    aria-label="Toggle mobile menu"
                    aria-expanded="false"
                    aria-controls="nav-links">
              <span aria-hidden="true"></span>
              <span aria-hidden="true"></span>
              <span aria-hidden="true"></span>
            </button>
          </div>

        </div>
      </div>
    </nav>
  </header>

  <!-- ===================================================
       MAIN CONTENT
  ==================================================== -->
  <main id="main-content">

    <div class="shop-page">
      <div class="container">
        <div style="margin-bottom:24px;">
          <p class="section-eyebrow">Browse</p>
          <h1 class="section-title">All Products</h1>
        </div>
        <div class="shop-layout">

          <!-- Sidebar Filters -->
          <aside class="sidebar" aria-label="Product filters">
            <div class="sidebar-sticky">

              <div class="filter-group">
                <button class="filter-header"
                        aria-expanded="true"
                        aria-controls="filter-category"
                        onclick="toggleFilter(this)">
                  <span class="filter-title">Category</span>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                       stroke="currentColor" stroke-width="2" aria-hidden="true" focusable="false">
                    <polyline points="6 9 12 15 18 9"/>
                  </svg>
                </button>
                <div class="filter-body" id="filter-category">
                  <label class="filter-option">
                    <input type="checkbox" onchange="applyFilters()" value="power-tools">
                    Power Tools <span class="filter-option-count" aria-hidden="true"></span>
                  </label>
                  <label class="filter-option">
                    <input type="checkbox" onchange="applyFilters()" value="hand-tools">
                    Hand Tools <span class="filter-option-count" aria-hidden="true"></span>
                  </label>
                  <label class="filter-option">
                    <input type="checkbox" onchange="applyFilters()" value="heavy-machinery">
                    Heavy Machinery <span class="filter-option-count" aria-hidden="true"></span>
                  </label>
                  <label class="filter-option">
                    <input type="checkbox" onchange="applyFilters()" value="safety">
                    Safety Equipment <span class="filter-option-count" aria-hidden="true"></span>
                  </label>
                  <label class="filter-option">
                    <input type="checkbox" onchange="applyFilters()" value="materials">
                    Materials <span class="filter-option-count" aria-hidden="true"></span>
                  </label>
                  <label class="filter-option">
                    <input type="checkbox" onchange="applyFilters()" value="electrical">
                    Electrical <span class="filter-option-count" aria-hidden="true"></span>
                  </label>
                  <label class="filter-option">
                    <input type="checkbox" onchange="applyFilters()" value="plumbing">
                    Plumbing <span class="filter-option-count" aria-hidden="true"></span>
                  </label>
                </div>
              </div>

              <div class="filter-group">
                <button class="filter-header"
                        aria-expanded="true"
                        aria-controls="filter-brand"
                        onclick="toggleFilter(this)">
                  <span class="filter-title">Brand</span>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                       stroke="currentColor" stroke-width="2" aria-hidden="true" focusable="false">
                    <polyline points="6 9 12 15 18 9"/>
                  </svg>
                </button>
                <div class="filter-body" id="filter-brand">
                  <label class="filter-option">
                    <input type="checkbox" onchange="applyFilters()" value="dewalt">
                    DeWalt <span class="filter-option-count" aria-hidden="true"></span>
                  </label>
                  <label class="filter-option">
                    <input type="checkbox" onchange="applyFilters()" value="makita">
                    Makita <span class="filter-option-count" aria-hidden="true"></span>
                  </label>
                  <label class="filter-option">
                    <input type="checkbox" onchange="applyFilters()" value="bosch">
                    Bosch <span class="filter-option-count" aria-hidden="true"></span>
                  </label>
                  <label class="filter-option">
                    <input type="checkbox" onchange="applyFilters()" value="milwaukee">
                    Milwaukee <span class="filter-option-count" aria-hidden="true"></span>
                  </label>
                  <label class="filter-option">
                    <input type="checkbox" onchange="applyFilters()" value="stanley">
                    Stanley <span class="filter-option-count" aria-hidden="true"></span>
                  </label>
                </div>
              </div>

              <div class="filter-group">
                <button class="filter-header"
                        aria-expanded="true"
                        aria-controls="filter-price"
                        onclick="toggleFilter(this)">
                  <span class="filter-title">Price Range</span>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                       stroke="currentColor" stroke-width="2" aria-hidden="true" focusable="false">
                    <polyline points="6 9 12 15 18 9"/>
                  </svg>
                </button>
                <fieldset class="filter-body" id="filter-price">
                  <legend class="sr-only">Price range</legend>
                  <div class="price-range-inputs">
                    <label class="sr-only" for="priceMin">Minimum price</label>
                    <input class="price-input" type="number" id="priceMin"
                           placeholder="Min $" min="0" onchange="applyFilters()">
                    <span class="price-separator">-</span>
                    <label class="sr-only" for="priceMax">Maximum price</label>
                    <input class="price-input" type="number" id="priceMax"
                           placeholder="Max $" min="0" onchange="applyFilters()">
                  </div>
                </fieldset>
              </div>

              <div class="filter-group">
                <button class="filter-header"
                        aria-expanded="true"
                        aria-controls="filter-avail"
                        onclick="toggleFilter(this)">
                  <span class="filter-title">Availability</span>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                       stroke="currentColor" stroke-width="2" aria-hidden="true" focusable="false">
                    <polyline points="6 9 12 15 18 9"/>
                  </svg>
                </button>
                <div class="filter-body" id="filter-avail">
                  <label class="filter-option">
                    <input type="checkbox" onchange="applyFilters()" value="instock">
                    In Stock <span class="filter-option-count" aria-hidden="true"></span>
                  </label>
                  <label class="filter-option">
                    <input type="checkbox" onchange="applyFilters()" value="sale">
                    On Sale <span class="filter-option-count" aria-hidden="true"></span>
                  </label>
                </div>
              </div>

            </div>
          </aside>

          <!-- Product Listing -->
          <section aria-label="Product listing">
            <div class="shop-toolbar">
              <p class="shop-count" aria-live="polite" aria-atomic="true">
                Showing <strong id="shopProductCount">0</strong> products
              </p>
              <label class="sr-only" for="sortSelect">Sort products</label>
              <select class="sort-select" id="sortSelect" onchange="applyFilters()">
                <option value="default">Sort: Featured</option>
                <option value="price-asc">Price: Low to High</option>
                <option value="price-desc">Price: High to Low</option>
                <option value="name">Name: A–Z</option>
                <option value="rating">Best Rated</option>
              </select>
            </div>
            <div class="active-filters" id="activeFilters" aria-label="Active filters"></div>
            <ul class="product-grid" id="shopProductGrid" role="list" aria-label="Shop products"></ul>
          </section>

        </div>
      </div>
    </div>

  </main>

  <!-- ===================================================
       FOOTER
  ==================================================== -->
  <footer class="footer" role="contentinfo">
    <div class="container">
      <div class="footer-main">
        <div class="footer-brand">
          <span class="logo-text" aria-label="IRONFORGE">IRON<span>FORGE</span></span>
          <p class="footer-tagline">
            Professional construction equipment and materials since 1987.
            Trusted by contractors across the nation.
          </p>
        </div>
      </div>
    </div>
  </footer>

  <div id="toastContainer" class="toast-container" aria-live="polite" aria-atomic="false"></div>

  <script src="script.js"></script>
</body>
</html>
