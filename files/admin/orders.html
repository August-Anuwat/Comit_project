<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orders — IRONFORGE Admin</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="admin-style.css" />
</head>

<body>
<div class="shell" id="shell">

  <!-- ============================================================
       SIDEBAR
  ============================================================ -->
  <aside class="sidebar">

    <div class="sidebar-brand">
      <div class="brand-mark">
        <svg viewBox="0 0 18 18" fill="none">
          <rect x="2" y="2" width="6" height="14" fill="white"/>
          <rect x="10" y="2" width="6" height="9" fill="white" opacity="0.7"/>
        </svg>
      </div>
      <div>
        <div class="brand-name">IRON<span>FORGE</span></div>
        <div class="brand-label">Admin Panel</div>
      </div>
    </div>

    <nav class="sidebar-nav" role="navigation" aria-label="Admin navigation">
      <div class="nav-section">Main</div>

      <a class="nav-item" href="dashboard.html">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7" rx="1"/>
            <rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/>
            <rect x="14" y="14" width="7" height="7" rx="1"/>
          </svg>
        </span>
        <span class="nav-label">Dashboard</span>
      </a>

      <a class="nav-item active" href="orders.html" aria-current="page">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
            <line x1="3" y1="6" x2="21" y2="6"/>
            <path d="M16 10a4 4 0 01-8 0"/>
          </svg>
        </span>
        <span class="nav-label">Orders</span>
      </a>

      <a class="nav-item" href="messages.html">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
          </svg>
        </span>
        <span class="nav-label">Messages</span>
        <span class="nav-badge" id="sidebarBadge" style="display:none"></span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="user-avatar">AD</div>
        <div class="user-info">
          <div class="user-name">Admin User</div>
          <div class="user-role">superadmin</div>
        </div>
        <button class="collapse-btn" onclick="toggleSidebar()" title="Collapse sidebar" aria-label="Toggle sidebar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M15 19l-7-7 7-7"/>
          </svg>
        </button>
      </div>
    </div>

  </aside>

  <!-- ============================================================
       TOPBAR
  ============================================================ -->
  <header class="topbar" role="banner">
    <div class="topbar-breadcrumb">
      <span class="breadcrumb-site">ironforge.com</span>
      <span class="breadcrumb-sep">/</span>
      <span class="breadcrumb-page">Orders</span>
    </div>
    <div class="topbar-actions">
      <a class="topbar-icon-btn" href="messages.html" title="Notifications" aria-label="View notifications">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 01-3.46 0"/>
        </svg>
        <span class="topbar-notif-dot" id="notifDot" style="display:none"></span>
      </a>
      <div class="topbar-divider"></div>
      <div class="admin-chip">
        <div class="admin-chip-avatar">AD</div>
        <span class="admin-chip-name">Admin</span>
      </div>
      <button class="logout-btn" onclick="showToast('Logged out successfully.', 'info')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span>Logout</span>
      </button>
    </div>
  </header>

  <!-- ============================================================
       MAIN CONTENT
  ============================================================ -->
  <main class="main">
    <div class="content">

      <div class="page-header">
        <div>
          <div class="page-eyebrow">Management</div>
          <h1 class="page-title">Orders</h1>
        </div>
        <button class="btn btn-accent">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5"  y1="12" x2="19" y2="12"/>
          </svg>
          Export CSV
        </button>
      </div>

      <div class="section-card">
        <div class="section-card-header">
          <div>
            <div class="section-card-title">All Orders</div>
            <div class="section-card-sub" id="ordersCountLabel">Loading…</div>
          </div>
          <div class="toolbar">
            <div class="toolbar-search">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
              </svg>
              <input type="text" id="orderSearch" placeholder="Search by ID or customer…" oninput="renderOrders()" />
            </div>
            <select class="toolbar-select" id="orderStatusFilter" onchange="renderOrders()">
              <option value="">All statuses</option>
              <option value="Pending">Pending</option>
              <option value="Processing">Processing</option>
              <option value="Completed">Completed</option>
            </select>
          </div>
        </div>
        <div class="table-wrap">
          <table aria-label="Orders table">
            <thead>
              <tr>
                <th>Order ID</th>
                <th>Customer</th>
                <th>Items</th>
                <th>Total</th>
                <th>Status</th>
                <th>Date</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="ordersBody"></tbody>
          </table>
        </div>
      </div>

    </div>
  </main>

</div><!-- /.shell -->

<!-- Order Detail Modal -->
<div class="modal-overlay" id="orderModal" role="dialog" aria-modal="true" aria-label="Order details">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="orderModalTitle">Order Detail</div>
        <div class="modal-subtitle" id="orderModalSub"></div>
      </div>
      <button class="modal-close" onclick="closeModal('orderModal')" aria-label="Close modal">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6"  y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="modal-body" id="orderModalBody"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('orderModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveOrderStatus()">Save Changes</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast-container" id="toastContainer" aria-live="polite"></div>

<script src="admin-script.js" defer></script>
</body>
</html>
