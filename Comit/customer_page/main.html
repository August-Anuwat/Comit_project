<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BUILDPRO — วัสดุก่อสร้างครบวงจร</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;700&family=Bebas+Neue&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --orange: #F26522;
    --orange-dark: #C44D0A;
    --orange-light: #FFF3EC;
    --dark: #1A1A1A;
    --charcoal: #2D2D2D;
    --steel: #4A5568;
    --light: #F7F4F0;
    --white: #FFFFFF;
    --red: #C0392B;
    --green: #1E8449;
    --border: #E2DDD8;
    --surface: #F4F1ED;
  }

  html { scroll-behavior: smooth; }
  body {
    font-family: 'Noto Sans Thai', sans-serif;
    background: var(--surface);
    color: var(--dark);
    min-height: 100vh;
  }

  /* ====== NAVBAR ====== */
  nav {
    background: var(--charcoal);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 16px rgba(0,0,0,0.35);
    border-bottom: 3px solid var(--orange);
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    color: var(--orange);
    letter-spacing: 4px;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .nav-right { display: flex; align-items: center; gap: 1.2rem; }

  .nav-search {
    background: rgba(255,255,255,0.08);
    border: 1.5px solid rgba(255,255,255,0.18);
    border-radius: 6px;
    padding: 7px 16px;
    color: white;
    font-family: 'Noto Sans Thai', sans-serif;
    font-size: 0.85rem;
    width: 210px;
    outline: none;
    transition: all 0.2s;
  }
  .nav-search::placeholder { color: rgba(255,255,255,0.45); }
  .nav-search:focus { background: rgba(255,255,255,0.14); border-color: var(--orange); }

  .cart-btn {
    position: relative;
    background: var(--orange);
    border: none;
    border-radius: 6px;
    padding: 9px 20px 9px 14px;
    display: flex; align-items: center; gap: 8px;
    font-family: 'Noto Sans Thai', sans-serif;
    font-weight: 700; font-size: 0.9rem;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    color: white;
  }
  .cart-btn:hover { background: var(--orange-dark); transform: translateY(-1px); }
  .cart-btn svg { width: 19px; height: 19px; }
  .cart-badge {
    position: absolute; top: -7px; right: -7px;
    background: var(--red); color: white;
    font-size: 0.68rem; font-weight: 700;
    width: 20px; height: 20px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .cart-badge.pop { animation: pop 0.25s ease; }
  @keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.5)} 100%{transform:scale(1)} }

  /* ====== HERO ====== */
  .hero-wrap { background: var(--charcoal); }
  .hero {
    max-width: 1280px; margin: 0 auto;
    padding: 3rem 2rem;
    display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;
    align-items: center;
  }
  .hero-text h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.8rem, 5.5vw, 5rem);
    line-height: 0.93; color: white; letter-spacing: 2px;
  }
  .hero-text h1 em {
    font-family: 'DM Serif Display', serif;
    font-style: italic; color: var(--orange);
  }
  .hero-text p {
    margin-top: 1rem; font-size: 0.95rem;
    color: rgba(255,255,255,0.62); max-width: 380px; line-height: 1.65;
  }
  .hero-badges { display: flex; gap: 10px; margin-top: 1.4rem; flex-wrap: wrap; }
  .hero-badge {
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.8); font-size: 0.78rem;
    padding: 5px 12px; border-radius: 4px; display: flex; align-items: center; gap: 5px;
  }
  .hero-cta {
    margin-top: 1.8rem; background: var(--orange); color: white; border: none;
    padding: 13px 30px; border-radius: 6px;
    font-family: 'Noto Sans Thai', sans-serif; font-weight: 700; font-size: 1rem;
    cursor: pointer; transition: background 0.2s, transform 0.15s; display: inline-block;
  }
  .hero-cta:hover { background: var(--orange-dark); transform: translateY(-1px); }

  .hero-visual { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .hero-card {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px; padding: 1.2rem; text-align: center;
  }
  .hero-card:first-child { grid-column: span 2; background: rgba(242,101,34,0.15); border-color: rgba(242,101,34,0.35); }
  .hero-card .hc-emoji { font-size: 3.5rem; }
  .hero-card:first-child .hc-emoji { font-size: 5rem; }
  .hero-card .hc-label { font-size: 0.75rem; color: rgba(255,255,255,0.55); margin-top: 6px; }

  /* ====== CATEGORY BAR ====== */
  .category-bar {
    background: white; border-bottom: 2px solid var(--border);
    padding: 0 2rem; display: flex; gap: 0; overflow-x: auto;
    position: sticky; top: 64px; z-index: 90; scrollbar-width: none;
  }
  .category-bar::-webkit-scrollbar { display: none; }
  .cat-tab {
    padding: 13px 18px; border: none; background: none;
    font-family: 'Noto Sans Thai', sans-serif; font-size: 0.87rem; font-weight: 500;
    color: var(--steel); cursor: pointer;
    border-bottom: 3px solid transparent; margin-bottom: -2px;
    transition: all 0.18s; white-space: nowrap;
    display: flex; align-items: center; gap: 5px;
  }
  .cat-tab:hover { color: var(--orange); }
  .cat-tab.active { color: var(--orange); border-bottom-color: var(--orange); font-weight: 700; }

  /* ====== MAIN ====== */
  .container {
    max-width: 1280px; margin: 0 auto; padding: 2.5rem 2rem;
    display: grid; grid-template-columns: 1fr 360px; gap: 2.5rem; align-items: start;
  }
  .section-title {
    font-family: 'Bebas Neue', sans-serif; font-size: 2rem;
    letter-spacing: 1px; color: var(--dark); margin-bottom: 1.4rem;
  }
  .section-title span { font-family: 'DM Serif Display', serif; font-style: italic; color: var(--orange); }

  /* ====== PRODUCT GRID ====== */
  .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(228px, 1fr)); gap: 1.25rem; }

  .product-card {
    background: white; border-radius: 8px; overflow: hidden;
    border: 1px solid var(--border); transition: transform 0.2s, box-shadow 0.2s;
    position: relative;
  }
  .product-card:hover { transform: translateY(-4px); box-shadow: 0 14px 36px rgba(0,0,0,0.10); }

  .product-badge {
    position: absolute; top: 10px; left: 10px;
    font-size: 0.7rem; font-weight: 700; padding: 3px 9px;
    border-radius: 3px; letter-spacing: 0.5px; z-index: 2;
  }
  .badge-sale { background: var(--red); color: white; }
  .badge-new  { background: var(--orange); color: white; }
  .badge-hot  { background: var(--charcoal); color: white; }

  .product-img {
    width: 100%; aspect-ratio: 1;
    display: flex; align-items: center; justify-content: center;
    font-size: 5.5rem; background: var(--light); transition: transform 0.3s; position: relative;
  }
  .product-card:hover .product-img { transform: scale(1.04); }
  .unit-tag {
    position: absolute; bottom: 8px; right: 8px;
    background: rgba(26,26,26,0.65); color: white;
    font-size: 0.68rem; padding: 2px 8px; border-radius: 3px;
  }

  .product-info { padding: 13px 14px 15px; }
  .product-brand { font-size: 0.7rem; color: var(--orange); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
  .product-name { font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; letter-spacing: 0.5px; color: var(--dark); line-height: 1.1; }
  .product-desc { font-size: 0.78rem; color: var(--steel); margin-top: 3px; margin-bottom: 10px; line-height: 1.4; }
  .product-price-row { display: flex; align-items: baseline; gap: 6px; margin-bottom: 11px; flex-wrap: wrap; }
  .product-price { font-size: 1.35rem; font-weight: 700; color: var(--dark); }
  .product-unit { font-size: 0.75rem; color: var(--steel); }
  .product-price-old { font-size: 0.8rem; color: #aaa; text-decoration: line-through; }

  .add-to-cart {
    width: 100%; background: var(--orange); color: white; border: none;
    padding: 10px; border-radius: 5px;
    font-family: 'Noto Sans Thai', sans-serif; font-weight: 700; font-size: 0.88rem;
    cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .add-to-cart:hover { background: var(--orange-dark); }
  .add-to-cart.added { background: var(--green); }

  /* ====== CART SIDEBAR ====== */
  .cart-sidebar {
    background: white; border: 2px solid var(--border); border-radius: 10px;
    position: sticky; top: 118px; overflow: hidden;
  }
  .cart-header {
    background: var(--charcoal); padding: 1rem 1.25rem;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 3px solid var(--orange);
  }
  .cart-header h2 { font-family: 'Bebas Neue', sans-serif; font-size: 1.45rem; color: white; letter-spacing: 1px; }
  .cart-count-label { background: var(--orange); color: white; font-size: 0.75rem; font-weight: 700; padding: 3px 10px; border-radius: 4px; }

  .cart-empty { padding: 2.5rem 1.5rem; text-align: center; color: #aaa; }
  .cart-empty-icon { font-size: 3.5rem; opacity: 0.3; margin-bottom: 0.8rem; }
  .cart-empty p { font-size: 0.88rem; line-height: 1.5; }

  .cart-items { max-height: 370px; overflow-y: auto; }
  .cart-items::-webkit-scrollbar { width: 4px; }
  .cart-items::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .cart-item {
    display: grid; grid-template-columns: 50px 1fr auto;
    gap: 10px; align-items: start; padding: 11px 14px;
    border-bottom: 1px solid var(--border); animation: slideIn 0.22s ease;
  }
  @keyframes slideIn { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:none} }

  .cart-item-emoji {
    width: 50px; height: 50px; background: var(--light); border-radius: 6px;
    display: flex; align-items: center; justify-content: center; font-size: 1.7rem; flex-shrink: 0;
  }
  .cart-item-name { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: 0.3px; line-height: 1.2; }
  .cart-item-sub { font-size: 0.73rem; color: var(--steel); margin-top: 1px; }
  .qty-control { display: flex; align-items: center; gap: 5px; margin-top: 6px; }
  .qty-btn {
    width: 22px; height: 22px; border: 1.5px solid var(--border);
    background: white; border-radius: 4px; font-size: 0.95rem; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; color: var(--dark); line-height: 1;
  }
  .qty-btn:hover { background: var(--orange-light); border-color: var(--orange); color: var(--orange); }
  .qty-num { font-weight: 700; font-size: 0.88rem; min-width: 18px; text-align: center; }
  .cart-item-price { text-align: right; }
  .cart-item-price-main { font-weight: 700; font-size: 0.95rem; }
  .cart-item-remove {
    display: block; font-size: 0.68rem; color: #bbb; cursor: pointer;
    background: none; border: none; padding: 0;
    font-family: 'Noto Sans Thai', sans-serif; margin-top: 3px; text-align: right; text-decoration: underline;
  }
  .cart-item-remove:hover { color: var(--red); }

  /* ====== SUMMARY ====== */
  .cart-summary { padding: 1rem 1.25rem; border-top: 2px solid var(--border); background: var(--surface); }
  .summary-row { display: flex; justify-content: space-between; font-size: 0.87rem; color: var(--steel); margin-bottom: 5px; }
  .summary-row.discount { color: var(--red); font-weight: 600; }
  .summary-divider { border: none; border-top: 1px dashed var(--border); margin: 10px 0; }
  .summary-total { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
  .summary-total span:first-child { font-size: 0.95rem; font-weight: 700; }
  .summary-total span:last-child { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: var(--orange); letter-spacing: 1px; }
  .summary-vat { text-align: right; font-size: 0.72rem; color: var(--steel); margin-bottom: 12px; }

  .info-tag { border-radius: 5px; padding: 7px 12px; font-size: 0.78rem; font-weight: 600; text-align: center; margin-bottom: 10px; }
  .info-tag.green { background: #e8f5e9; color: var(--green); border: 1px solid #a5d6a7; }
  .info-tag.orange { background: var(--orange-light); color: var(--orange-dark); border: 1px solid #f4b98a; }

  .checkout-btn {
    width: 100%; background: var(--orange); color: white; border: none;
    padding: 13px; border-radius: 6px;
    font-family: 'Noto Sans Thai', sans-serif; font-weight: 700; font-size: 0.97rem;
    cursor: pointer; transition: all 0.2s;
  }
  .checkout-btn:hover { background: var(--orange-dark); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(242,101,34,0.35); }
  .clear-btn {
    width: 100%; background: none; border: 1.5px solid var(--border); color: var(--steel);
    padding: 8px; border-radius: 6px; font-family: 'Noto Sans Thai', sans-serif;
    font-size: 0.82rem; cursor: pointer; margin-top: 7px; transition: all 0.2s;
  }
  .clear-btn:hover { border-color: var(--red); color: var(--red); }

  /* ====== TOAST ====== */
  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--charcoal); color: white;
    padding: 11px 22px; border-radius: 6px; font-size: 0.88rem; font-weight: 500;
    z-index: 999; transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    white-space: nowrap; border-left: 4px solid var(--orange);
    box-shadow: 0 8px 24px rgba(0,0,0,0.25);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 960px) {
    .hero { grid-template-columns: 1fr; }
    .hero-visual { display: none; }
    .container { grid-template-columns: 1fr; }
    .cart-sidebar { position: static; }
  }
  @media (max-width: 600px) {
    nav { padding: 0 1rem; }
    .nav-search { width: 130px; }
    .hero, .container { padding: 1.5rem 1rem; }
  }
</style>
</head>
<body>

<nav>
  <a class="logo" href="#">🏗️ BUILDPRO</a>
  <div class="nav-right">
    <button class="cart-btn" onclick="scrollToCart()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
        <line x1="3" y1="6" x2="21" y2="6"/>

      </svg>
      ตะกร้า

    </button>
  </div>
</nav>

<div class="hero-wrap">
  <div class="hero">
    <div class="hero-text">
      <h1>วัสดุก่อสร้าง<br><em>คุณภาพสูง</em><br>ราคาโรงงาน</h1>
      <p>ครบทุกความต้องการสำหรับงานก่อสร้างและรีโนเวต ส่งตรงถึงไซต์งาน</p>
      <button class="hero-cta" onclick="document.querySelector('.product-grid').scrollIntoView({behavior:'smooth'})">เลือกซื้อสินค้า →</button>
    </div>
  </div>
</div>

<div class="category-bar">
  <button class="cat-tab active" onclick="filterCat('all',this)">ทั้งหมด</button>
  <button class="cat-tab" onclick="filterCat('concrete',this)">คอนกรีต & อิฐ</button>
  <button class="cat-tab" onclick="filterCat('steel',this)">เหล็ก & โครงสร้าง</button>
  <button class="cat-tab" onclick="filterCat('roof',this)">หลังคา & ฝ้า</button>
  <button class="cat-tab" onclick="filterCat('electric',this)">ไฟฟ้า & ประปา</button>
  <button class="cat-tab" onclick="filterCat('floor',this)">พื้น & กระเบื้อง</button>
  <button class="cat-tab" onclick="filterCat('paint',this)">สี & เคมีภัณฑ์</button>
  <button class="cat-tab" onclick="filterCat('tool',this)">เครื่องมือช่าง</button>
</div>

<div class="container">
  <div>
    <h2 class="section-title">สินค้า<span>วัสดุก่อสร้าง</span></h2>
    <div class="product-grid" id="productGrid"></div>
  </div>

  <div class="cart-sidebar" id="cartSidebar">
    <div class="cart-header">
      <h2>🛒 ตะกร้าสินค้า</h2>
      <span class="cart-count-label" id="cartCountLabel">0 รายการ</span>
    </div>
    <div id="cartEmpty" class="cart-empty">
      <p>ยังไม่มีสินค้าในตะกร้า<br>เลือกวัสดุที่ต้องการได้เลย!</p>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-summary" id="cartSummary" style="display:none;">
      <div class="summary-row"><span>ราคาสินค้า</span><span id="summarySubtotal">฿0</span></div>
      <div class="summary-row discount" id="discountRow" style="display:none;"><span>ส่วนลด</span><span id="summaryDiscount"></span></div>
      <div class="summary-row"><span>ค่าจัดส่ง</span><span id="summaryShip">฿500</span></div>
      <hr class="summary-divider">
      <div id="infoTag" class="info-tag" style="display:none;"></div>
      <div class="summary-total"><span>ยอดรวมทั้งสิ้น</span><span id="summaryTotal">฿0</span></div>
      <div class="summary-vat" id="summaryVat"></div>
      <button class="checkout-btn" onclick="checkout()">สั่งซื้อและชำระเงิน →</button>
      <button class="clear-btn" onclick="clearCart()">ล้างตะกร้า</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

  { id:7,  name:"แผ่นเหล็กแบน 3 มม.", brand:"G Steel", desc:"ขนาด 1.22×2.44 ม.", price:2650, emoji:"🔧", cat:"steel", unit:"/แผ่น", badge:"new" },

  { id:9,  name:"แผ่นยิปซัมฝ้า", brand:"Gyproc", desc:"หนา 9 มม. ขนาด 1.2×2.4 ม.", price:165, oldPrice:195, emoji:"🪟", cat:"roof", unit:"/แผ่น", badge:"sale" },

  { id:11, name:"สายไฟ THW 2.5 ตร.มม.", brand:"Phelps Dodge", desc:"ขดยาว 100 ม. สีเหลือง", price:850, emoji:"🔌", cat:"electric", unit:"/ขด", badge:"hot" },

  { id:13, name:"ตู้เบรกเกอร์ 4 ช่อง", brand:"Schneider", desc:"ขนาด 4 วงจร พร้อมสาย", price:1290, oldPrice:1590, emoji:"⚡", cat:"electric", unit:"/ชุด", badge:"sale" },
  { id:14, name:"กระเบื้องพื้นหินขัด", brand:"Cotto", desc:"ขนาด 60×60 ซม. สีขาวครีม", price:185, emoji:"🪵", cat:"floor", unit:"/แผ่น" },
  { id:15, name:"กระเบื้องผนังบาธรูม", brand:"Campana", desc:"ขนาด 30×60 ซม. ลายหิน", price:145, oldPrice:175, emoji:"🏺", cat:"floor", unit:"/แผ่น", badge:"sale" },
  { id:16, name:"ไม้พื้น Laminate", brand:"Leowood", desc:"หนา 8 มม. ลายไม้โอ๊ค", price:195, emoji:"🪵", cat:"floor", unit:"/แผ่น", badge:"new" },
  { id:17, name:"สีทาบ้านนอก NanoShield", brand:"TOA", desc:"ถัง 5 กล. สีขาว กันเชื้อรา", price:2190, emoji:"🎨", cat:"paint", unit:"/ถัง" },

  { id:19, name:"กาวซีเมนต์ยืดหยุ่น", brand:"Weber", desc:"ถุง 20 กก. กาวปูกระเบื้อง", price:390, emoji:"🧴", cat:"paint", unit:"/ถุง" },
  { id:20, name:"สว่านโรตารี่ SDS+", brand:"Bosch", desc:"รุ่น GBH 2-26 กำลัง 830W", price:4990, oldPrice:5990, emoji:"🔧", cat:"tool", unit:"/เครื่อง", badge:"sale" },
  { id:21, name:"เลื่อยวงเดือน 7\"", brand:"Makita", desc:"รุ่น 5007N กำลัง 1200W", price:3290, emoji:"🪚", cat:"tool", unit:"/เครื่อง" },
  { id:22, name:"ชุดประแจแหวน 12 ตัว", brand:"Stanley", desc:"ขนาด 6-32 มม. เหล็ก Cr-V", price:890, oldPrice:1090, emoji:"🔑", cat:"tool", unit:"/ชุด", badge:"hot" },
];

let cart = {};
function fmt(n) { return '฿' + n.toLocaleString('th-TH'); }

function renderProducts(cat) {
  const grid = document.getElementById('productGrid');
  const filtered = cat === 'all' ? products : products.filter(p => p.cat === cat);
  grid.innerHTML = filtered.map(p => {
    let b = '';
    if (p.badge === 'sale') b = ``;
    else if (p.badge === 'new') b = ``;
    else if (p.badge === 'hot') b = ``;
    return `
    <div class="product-card">${b}
      <div class="product-img">${p.emoji}<span class="unit-tag">${p.unit}</span></div>
      <div class="product-info">
        <div class="product-brand">${p.brand}</div>
        <div class="product-name">${p.name}</div>
        <div class="product-desc">${p.desc}</div>
        <div class="product-price-row">
          <span class="product-price">${fmt(p.price)}</span>
          <span class="product-unit">${p.unit}</span>
          ${p.oldPrice ? `<span class="product-price-old">${fmt(p.oldPrice)}</span>` : ''}
        </div>
        <button class="add-to-cart" id="btn-${p.id}" onclick="addToCart(${p.id})">+ เพิ่มในตะกร้า</button>
      </div>
    </div>`;
  }).join('');
}

function filterCat(cat, el) {
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderProducts(cat);
}

function addToCart(id) {
  const p = products.find(x => x.id === id);
  if (!p) return;
  cart[id] = cart[id] ? { ...cart[id], qty: cart[id].qty + 1 } : { ...p, qty: 1 };
  renderCart();
  showToast(`✓ เพิ่ม ${p.name} ในตะกร้าแล้ว`);
  const btn = document.getElementById('btn-' + id);
  if (btn) {
    btn.classList.add('added'); btn.textContent = '✓ เพิ่มแล้ว';
    setTimeout(() => { btn.classList.remove('added'); btn.textContent = '+ เพิ่มในตะกร้า'; }, 1200);
  }
  const badge = document.getElementById('cartBadge');
  badge.classList.remove('pop'); void badge.offsetWidth; badge.classList.add('pop');
}

function changeQty(id, d) {
  if (!cart[id]) return;
  cart[id].qty += d;
  if (cart[id].qty <= 0) delete cart[id];
  renderCart();
}
function removeItem(id) { delete cart[id]; renderCart(); }
function clearCart() { cart = {}; renderCart(); showToast('🗑️ ล้างตะกร้าแล้ว'); }

function renderCart() {
  const items = Object.values(cart);
  const totalQty = items.reduce((s, i) => s + i.qty, 0);
  document.getElementById('cartBadge').textContent = totalQty;
  document.getElementById('cartCountLabel').textContent = totalQty + ' รายการ';
  const emptyEl = document.getElementById('cartEmpty');
  const itemsEl = document.getElementById('cartItems');
  const summaryEl = document.getElementById('cartSummary');
  if (!items.length) { emptyEl.style.display=''; itemsEl.innerHTML=''; summaryEl.style.display='none'; return; }
  emptyEl.style.display='none'; summaryEl.style.display='';
  itemsEl.innerHTML = items.map(i => `
    <div class="cart-item">
      <div class="cart-item-emoji">${i.emoji}</div>
      <div>
        <div class="cart-item-name">${i.name}</div>
        <div class="cart-item-sub">${i.brand} · ${i.unit}</div>
        <div class="qty-control">
          <button class="qty-btn" onclick="changeQty(${i.id},-1)">−</button>
          <span class="qty-num">${i.qty}</span>
          <button class="qty-btn" onclick="changeQty(${i.id},1)">+</button>
        </div>
      </div>
      <div class="cart-item-price">
        <div class="cart-item-price-main">${fmt(i.price*i.qty)}</div>
        <button class="cart-item-remove" onclick="removeItem(${i.id})">ลบ</button>
      </div>
    </div>`).join('');

  const subtotal = items.reduce((s,i)=>s+i.price*i.qty, 0);
  const origTotal = items.reduce((s,i)=>s+(i.oldPrice||i.price)*i.qty, 0);
  const disc = origTotal - subtotal;
  const ship = subtotal >= 10000 ? 0 : 500;
  const total = subtotal + ship;
  const vat = Math.round(total*7/107);

  document.getElementById('summarySubtotal').textContent = fmt(subtotal);
  document.getElementById('summaryShip').textContent = ship===0 ? '🎉 ฟรี!' : fmt(ship);
  const discRow = document.getElementById('discountRow');
  if (disc>0) { discRow.style.display='flex'; document.getElementById('summaryDiscount').textContent='−'+fmt(disc); }
  else discRow.style.display='none';

  const tag = document.getElementById('infoTag');
  if (ship===0) {
    tag.className='info-tag green';
    tag.textContent = disc>0 ? `🎉 ประหยัดรวม ${fmt(disc+500)} รวมค่าส่งฟรี!` : '🚛 ยอดครบ ฿10,000 — จัดส่งถึงไซต์งานฟรี!';
    tag.style.display='';
  } else if (subtotal>0) {
    tag.className='info-tag orange';
    tag.textContent=`🚛 สั่งอีก ${fmt(10000-subtotal)} รับส่งฟรีถึงไซต์!`;
    tag.style.display='';
  } else tag.style.display='none';

  document.getElementById('summaryTotal').textContent = fmt(total);
  document.getElementById('summaryVat').textContent = `รวมภาษีมูลค่าเพิ่ม 7% (${fmt(vat)})`;
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
}
function checkout() {
  showToast('✅ ส่งคำสั่งซื้อแล้ว! ทีมงานจะติดต่อกลับ');
  setTimeout(() => { cart={}; renderCart(); }, 1800);
}
function scrollToCart() {
  document.getElementById('cartSidebar').scrollIntoView({behavior:'smooth', block:'start'});
}

renderProducts('all');
renderCart();
</script>
